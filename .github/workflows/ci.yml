name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install -e ".[dev]"
      - run: ruff check polysim_sdk polysim_clob_client polysim_polymarket tests
      - run: mypy polysim_sdk polysim_clob_client polysim_polymarket
      - run: pytest -q
      - run: python -m build && python -m twine check dist/*
  secret-scan:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python -m pip install detect-secrets
      # Scan the whole tree; fail the build on any finding. The scan exits 0
      # even when it finds secrets, so we abort on a non-empty `results` object.
      - name: Run detect-secrets
        run: |
          detect-secrets scan --all-files . > .ds-scan.json
          python - <<'PY'
          import json, sys
          results = json.load(open(".ds-scan.json")).get("results", {})
          if results:
              print("::error::detect-secrets found potential secrets:")
              for f, items in results.items():
                  for it in items:
                      print(f"  {f}:{it.get('line_number')} -> {it.get('type')}")
              sys.exit(1)
          print("detect-secrets: clean")
          PY
